<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Soft neon inner glow -->
        <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
            <feComposite in="blur" in2="SourceGraphic" operator="atop"/>
        </filter>

        <!-- Subtle outer glow -->
        <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#39FF14" flood-opacity="0.35"/>
        </filter>
    </defs>

    <!-- Outer circle with glow -->
    <circle cx="32" cy="32" r="28" fill="#000" filter="url(#outerGlow)"/>

    <!-- Inner soft glow ring -->
    <circle cx="32" cy="32" r="26" stroke="#39FF14" stroke-width="1.5" fill="none" opacity="0.6" filter="url(#innerGlow)"/>

    <!-- Layer bars (more rounded, better spacing) -->
    <rect x="18" y="20" width="28" height="7" rx="3.5" fill="#39FF14"/>
    <rect x="18" y="29" width="28" height="7" rx="3.5" fill="#39FF14" opacity="0.85"/>
    <rect x="18" y="38" width="28" height="7" rx="3.5" fill="#39FF14" opacity="0.7"/>
</svg>
